name: Bug report
description: Report a reproducible problem in AI DJ.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include API keys, YouTube cookies, or private URLs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands, route, crate/vibe, and browser if relevant.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Start crate ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact keys, cookies, and personal data before posting.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Node 20.19, Chrome/Firefox/Safari, local/Railway/Docker"
